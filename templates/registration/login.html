{% load static %}
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вход</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
  </head>
  <body>
    <main class="auth">
      <section class="card auth__card">
        <h1 class="h1">Вход</h1>
        <p class="muted">Учёт подменных машин корпоративного автопарка</p>

        {% if form.errors %}
          <div class="message message--error">Неверный логин или пароль.</div>
        {% endif %}

        <form method="post" class="form">
          {% csrf_token %}
          <div class="field">
            <label class="label" for="id_username">Логин</label>
            <input class="input" type="text" name="username" id="id_username" autocomplete="username" required />
          </div>
          <div class="field">
            <label class="label" for="id_password">Пароль</label>
            <input class="input" type="password" name="password" id="id_password" autocomplete="current-password" required />
          </div>
          <input type="hidden" name="next" value="{{ next|default:'/' }}" />
          <button class="btn" type="submit">Войти</button>
        </form>
      </section>
    </main>
  </body>
</html>
